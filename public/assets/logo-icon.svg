<svg width="200" height="210" viewBox="0 0 200 210" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid background so white elements are always visible regardless of container bg -->
  <rect width="200" height="210" fill="#0d3d2c" rx="18"/>
  <defs>
    <!-- Hex clip -->
    <clipPath id="hex-clip">
      <polygon points="100,6 181,51 181,154 100,199 19,154 19,51"/>
    </clipPath>

    <!-- Awning area clip -->
    <clipPath id="awning-clip">
      <path d="M20,115 Q100,68 180,115 L180,152 Q100,156 20,152 Z"/>
    </clipPath>

    <!-- Gradient: hex body (darker at bottom) -->
    <linearGradient id="hex-dark" x1="100" y1="6" x2="100" y2="199" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0e3b2c"/>
      <stop offset="100%" stop-color="#092618"/>
    </linearGradient>

    <!-- Gradient: top lighter facet -->
    <linearGradient id="hex-light" x1="60" y1="6" x2="180" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1d7254"/>
      <stop offset="100%" stop-color="#145c41"/>
    </linearGradient>
  </defs>

  <!-- ── Base hex (dark body) ── -->
  <polygon
    points="100,6 181,51 181,154 100,199 19,154 19,51"
    fill="url(#hex-dark)"
  />

  <!-- ── Upper-left lighter facet (the teal face of the gem) ── -->
  <polygon
    points="100,6 181,51 181,120 19,120 19,51"
    fill="url(#hex-light)"
    clip-path="url(#hex-clip)"
  />

  <!-- ── Right-side catch-light (bright highlight) ── -->
  <polygon
    points="165,42 181,51 181,100 152,82"
    fill="#28a070"
    opacity="0.5"
    clip-path="url(#hex-clip)"
  />

  <!-- ════════════════════════════════ -->
  <!--  DIAMOND / GEM WIREFRAME        -->
  <!-- ════════════════════════════════ -->
  <!-- Crown (top flat section) -->
  <polygon
    points="100,19 84,39 116,39"
    fill="none"
    stroke="white"
    stroke-width="2"
    stroke-linejoin="round"
  />
  <!-- Girdle line (the widest equator of the gem) -->
  <line x1="74" y1="47" x2="126" y2="47" stroke="white" stroke-width="2"/>
  <!-- Crown sides: top point down to girdle -->
  <line x1="84" y1="39" x2="74"  y2="47" stroke="white" stroke-width="2"/>
  <line x1="116" y1="39" x2="126" y2="47" stroke="white" stroke-width="2"/>
  <line x1="100" y1="19" x2="84"  y2="39" stroke="white" stroke-width="2"/>
  <line x1="100" y1="19" x2="116" y2="39" stroke="white" stroke-width="2"/>
  <!-- Pavilion (bottom point from girdle) -->
  <line x1="74"  y1="47" x2="100" y2="68" stroke="white" stroke-width="2"/>
  <line x1="126" y1="47" x2="100" y2="68" stroke="white" stroke-width="2"/>
  <!-- Inner facet lines pavilion -->
  <line x1="84"  y1="39" x2="100" y2="68" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <line x1="116" y1="39" x2="100" y2="68" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <line x1="100" y1="19" x2="100" y2="68" stroke="white" stroke-width="1.2" opacity="0.5"/>

  <!-- ════════════════════════════════ -->
  <!--  STORE AWNING                   -->
  <!-- ════════════════════════════════ -->
  <!-- Dark base fill of awning -->
  <path
    d="M20,117 Q100,72 180,117 L180,152 Q100,158 20,152 Z"
    fill="#125940"
    clip-path="url(#hex-clip)"
  />

  <!-- Light stripes over the awning -->
  <g clip-path="url(#awning-clip)">
    <rect x="20"  y="65" width="13" height="100" fill="#33b880" opacity="0.85"/>
    <rect x="46"  y="65" width="13" height="100" fill="#33b880" opacity="0.85"/>
    <rect x="72"  y="65" width="13" height="100" fill="#33b880" opacity="0.85"/>
    <rect x="98"  y="65" width="13" height="100" fill="#33b880" opacity="0.85"/>
    <rect x="124" y="65" width="13" height="100" fill="#33b880" opacity="0.85"/>
    <rect x="150" y="65" width="13" height="100" fill="#33b880" opacity="0.85"/>
    <rect x="176" y="65" width="13" height="100" fill="#33b880" opacity="0.85"/>
  </g>

  <!-- Awning top arch sheen -->
  <path
    d="M20,117 Q100,72 180,117"
    fill="none"
    stroke="#55dda0"
    stroke-width="2.5"
    opacity="0.5"
    clip-path="url(#hex-clip)"
  />

  <!-- Scalloped bottom hem -->
  <path
    d="M20,152
       Q30,143 40,152
       Q50,161 60,152
       Q70,143 80,152
       Q90,161 100,152
       Q110,143 120,152
       Q130,161 140,152
       Q150,143 160,152
       Q170,161 180,152"
    fill="#125940"
    stroke="#33b880"
    stroke-width="1.8"
    clip-path="url(#hex-clip)"
  />

  <!-- ════════════════════════════════ -->
  <!--  WHITE STORE FRONT              -->
  <!-- ════════════════════════════════ -->
  <rect
    x="42" y="151" width="116" height="52"
    rx="3"
    fill="white"
    clip-path="url(#hex-clip)"
  />

  <!-- Arch / smiley inside store -->
  <path
    d="M56,165 Q100,200 144,165"
    fill="none"
    stroke="#0a3d28"
    stroke-width="10"
    stroke-linecap="round"
    clip-path="url(#hex-clip)"
  />

  <!-- Centre pillar/column -->
  <rect
    x="87" y="174" width="26" height="29"
    fill="#0a3d28"
    clip-path="url(#hex-clip)"
  />

  <!-- ════════════════════════════════ -->
  <!--  DECORATIVE BUBBLES (top-left)  -->
  <!-- ════════════════════════════════ -->
  <circle cx="24" cy="36" r="9"  fill="#1a5e3f" opacity="0.95"/>
  <circle cx="9"  cy="24" r="5.5" fill="#1a5e3f" opacity="0.80"/>
  <circle cx="36" cy="21" r="4.5" fill="#1a5e3f" opacity="0.70"/>
  <circle cx="14" cy="46" r="3.5" fill="#1a5e3f" opacity="0.55"/>
  <circle cx="6"  cy="40" r="3"   fill="#1a5e3f" opacity="0.45"/>
</svg>
